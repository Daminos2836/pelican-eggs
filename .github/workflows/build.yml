name: Build & Push Yolks

on:
  push:
    branches:
      - master
    paths:
      - "**/yolk/Dockerfile"
      - "**/yolk/entrypoint.sh"
      - ".github/workflows/build.yml"

jobs:
  # ----------------------------------------------------------
  # Étape 1 : détecter tous les dossiers **/yolk du repo
  # ----------------------------------------------------------
  discover:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
 
      - name: Discover yolk directories
        id: set-matrix
        run: |
          YOLKS=$(find . -type f -name "Dockerfile" -path "*/yolk/Dockerfile" \
            | sed 's|/Dockerfile||' \
            | sed 's|^\./||' \
            | sort)
 
          MATRIX=$(echo "$YOLKS" | jq -R -s -c \
            '{"include": [split("\n")[] | select(length > 0) | {
              context: .,
              image: (gsub("/yolk$"; "") | gsub("/"; "-") | . + "-yolk"),
              tag:   (gsub("/yolk$"; "") | gsub("/"; "-"))
            }]}')
 
          echo "matrix=${MATRIX}" >> $GITHUB_OUTPUT
          echo "Yolks found:"
          echo "$MATRIX" | jq .
 
  # ----------------------------------------------------------
  # Étape 2 : builder chaque yolk en parallèle
  # ----------------------------------------------------------
  build:
    needs: discover
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix: ${{ fromJson(needs.discover.outputs.matrix) }}
      fail-fast: false
 
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
 
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
 
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
 
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/pelican-eggs
          tags: |
            type=raw,value=${{ matrix.tag }}
 
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,scope=${{ matrix.image }},mode=max
          platforms: linux/amd64,linux/arm64
